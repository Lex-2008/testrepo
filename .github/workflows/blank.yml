# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: windows-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3

      - name: Checkout Core
        uses: actions/checkout@v3
        with:
          repository: cfengine/core

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      - name: get CFEngine
        run: c:/msys64/usr/bin/wget.exe  http://buildcache.cfengine.com/packages/testing-pr/jenkins-master-nightly-pipeline-1263/PACKAGES_x86_64_mingw/cfengine-nova-3.22.0a-26402-x86_64.msi

      - name: install CFEngine
        run: msiexec /i cfengine-nova-3.22.0a-26402-x86_64.msi

      - name: run cf-agent
        run: "'c:/Program Files/Cfengine/bin/cf-agent.exe' --version"
        shell: bash

      - name: run one test
        run: "c:/Program Files/Cfengine/bin/cf-agent.exe" -D AUTO 013.cf -K
        working-directory: tests/acceptance/00_basics/01_compiler
        shell: bash


